<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a3e085 0%, #65c434 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Authenticating...</h1>
        <p>Please wait while we complete your login.</p>
    </div>

    <script>
        // This page handles Google OAuth callback
        // The backend should redirect here with token in URL

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const error = urlParams.get('error');

        // Read returnTo from sessionStorage (stored by login.html before Google OAuth redirect)
        let returnTo = null;
        try {
            returnTo = sessionStorage.getItem('vimpl_oauth_return') || null;
            if (returnTo) sessionStorage.removeItem('vimpl_oauth_return');
        } catch { /* ignore */ }

        if (error) {
            window.location.href = `login.html?error=${encodeURIComponent(error)}`;
        } else if (token) {
            localStorage.setItem('accessToken', token);
            if (returnTo) {
                const sep = returnTo.includes('?') ? '&' : '?';
                window.location.href = `${returnTo}${sep}token=${token}`;
            } else {
                window.location.href = 'dashboard.html';
            }
        } else {
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    </script>
</body>

</html>
