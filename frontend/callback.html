<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a3e085 0%, #65c434 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Authenticating...</h1>
        <p>Please wait while we complete your login.</p>
    </div>

    <script>
        // Handles Google OAuth callback.
        // Backend redirects here with ?code=<short_hex> (never a raw JWT in the URL).
        const BACKEND = 'https://backend-eight-rho-46.vercel.app';

        const urlParams = new URLSearchParams(window.location.search);
        const code  = urlParams.get('code');
        const error = urlParams.get('error');

        let returnTo = null;
        try {
            returnTo = sessionStorage.getItem('vimpl_oauth_return') || null;
            if (returnTo) sessionStorage.removeItem('vimpl_oauth_return');
        } catch { /* ignore */ }

        if (error) {
            window.location.href = `login.html?error=${encodeURIComponent(error)}`;
        } else if (code) {
            // Exchange the one-time code for the real JWT
            fetch(`${BACKEND}/api/v1/auth/exchange-code?code=${encodeURIComponent(code)}`)
                .then(r => r.ok ? r.json() : Promise.reject(r.status))
                .then(async ({ token }) => {
                    localStorage.setItem('accessToken', token);
                    if (returnTo) {
                        // Create a fresh one-time code for the destination app
                        // so the JWT never appears in the destination URL either
                        const codeRes = await fetch(`${BACKEND}/api/v1/auth/create-code`, {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                        });
                        if (codeRes.ok) {
                            const { code: forwardCode } = await codeRes.json();
                            const sep = returnTo.includes('?') ? '&' : '?';
                            window.location.href = `${returnTo}${sep}code=${forwardCode}`;
                        } else {
                            window.location.href = returnTo;
                        }
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                })
                .catch(() => { window.location.href = 'login.html?error=auth_failed'; });
        } else {
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    </script>
</body>

</html>
