<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - vimpl</title>

    <link rel="stylesheet" href="assets/css/fonts.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-main {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-family: 'Birthstone', cursive;
            font-size: 48px;
            font-weight: 400;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 0;
        }


        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #65c434;
        }

        input::placeholder {
            color: #999;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 40px;
            position: relative;
            z-index: 1;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 20px;
            padding: 4px;
            z-index: 2;
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-password a {
            color: #65c434;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            margin-top: 24px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(101, 196, 52, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 16px;
            color: #666;
            font-size: 14px;
        }

        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: #ccc;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 14px;
        }

        .register-link a {
            color: #65c434;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 767px) {
            .login-container {
                padding: 32px 24px;
                max-width: 100%;
            }

            .logo h1 {
                font-size: 40px;
            }

            .logo p {
                font-size: 13px;
            }

            .btn {
                padding: 16px;
                font-size: 15px;
            }

            input {
                padding: 14px 16px;
                font-size: 16px;
                /* Prevents zoom on iOS */
            }

            .toggle-password {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .login-container {
                padding: 24px 20px;
            }

            .logo h1 {
                font-size: 36px;
            }

            .divider {
                margin: 24px 0;
            }

            .register-link {
                font-size: 13px;
            }
        }
    </style>
    <style>
        :root {
            --primary: #65c434;
            --primary-dark: #3d7a1f;
            --primary-light: #a3e085;
        }
    </style>
</head>

<body>
    <div class="login-container" style="position: relative;">
        <!-- Language switcher -->
        <div class="lang-switcher light" style="position: absolute; top: 1rem; left: 1rem;">
            <button class="lang-btn active" data-lang-switch="en">EN</button>
            <button class="lang-btn" data-lang-switch="da">DA</button>
        </div>
        <!-- Close / Cancel -->
        <a href="index.html" title="Cancel login"
            style="position: absolute; top: 1rem; right: 1rem; width: 2.25rem; height: 2.25rem; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1); border-radius: 50%; color: rgba(0,0,0,0.35); text-decoration: none; font-size: 1.1rem; font-weight: 300; transition: all 0.2s ease; cursor: pointer; z-index: 10;"
            onmouseover="this.style.background='rgba(0,0,0,0.09)';this.style.color='rgba(0,0,0,0.7)';this.style.borderColor='rgba(0,0,0,0.2)'"
            onmouseout="this.style.background='rgba(0,0,0,0.04)';this.style.color='rgba(0,0,0,0.35)';this.style.borderColor='rgba(0,0,0,0.1)'">✕</a>

        <div class="logo">
            <div class="logo-main">
                <h1>vimpl</h1>

            </div>
            <p data-i18n="welcomeBack">Welcome back! Please login to your account.</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" method="post" action="javascript:void(0)">
            <div class="form-group">
                <label for="email" data-i18n="emailLabel">Email</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password" data-i18n="passwordLabel">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        👁️
                    </button>
                </div>
                <div class="forgot-password">
                    <a href="#" onclick="showForgotForm(); return false;" data-i18n="forgotPassword">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn" data-i18n="loginBtn">
                Log in
            </button>
        </form>

        <div class="divider">
            <span data-i18n="orDivider">or</span>
        </div>

        <button type="button" class="btn btn-google" onclick="loginWithGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span data-i18n="continueGoogle">Continue with Google</span>
        </button>

        <div class="register-link">
            <span data-i18n="noAccount">Don't have an account?</span> <a href="register.html" data-i18n="signUp">Sign up</a>
        </div>

        <!-- Forgot password panel (hidden by default) -->
        <div id="forgotPanel" style="display:none; margin-top: 24px; border-top: 1px solid #e0e0e0; padding-top: 24px;">
            <p style="font-size: 14px; color: #333; margin-bottom: 16px; font-weight: 500;">Enter your email and we'll send you a reset link.</p>
            <div class="form-group" style="margin-bottom: 12px;">
                <input type="email" id="forgotEmail" placeholder="your.email@example.com" autocomplete="email">
            </div>
            <button type="button" class="btn btn-primary" id="forgotBtn" onclick="submitForgot()" style="margin-top: 0;">
                Send reset link
            </button>
            <div style="text-align: center; margin-top: 12px;">
                <a href="#" onclick="hideForgotForm(); return false;" style="font-size: 13px; color: #666; text-decoration: none;">← Back to login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/lang.js"></script>
    <script src="assets/js/cookie-banner.js" defer></script>
    <script>
        const apiClient = new ApiClient();
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('returnTo');

        // Check if already logged in
        if (apiClient.isAuthenticated()) {
            if (returnTo) {
                window.location.href = `${returnTo}?token=${apiClient.getToken()}`;
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous messages
            hideMessages();

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';

            try {
                const response = await apiClient.login(email, password);

                // Show success message
                showSuccess('Login successful! Redirecting...');

                setTimeout(() => {
                    if (returnTo) {
                        const sep = returnTo.includes('?') ? '&' : '?';
                        window.location.href = `${returnTo}${sep}token=${response.accessToken}`;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please check your credentials.');

                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Log in';
            }
        });

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // Google login — store returnTo in sessionStorage, encode only origin as state
        // (backend expects plain base64 origin URL, not JSON)
        function loginWithGoogle() {
            const baseUrl = apiClient.baseURL.replace('/api/v1', '');
            if (returnTo) sessionStorage.setItem('vimpl_oauth_return', returnTo);
            const state = btoa(window.location.origin);
            window.location.href = `${baseUrl}/api/v1/auth/google?state=${state}`;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // Hide all messages
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Check for error in URL (from OAuth callback)
        const error = urlParams.get('error');
        if (error) {
            showError(decodeURIComponent(error));
        }

        // Check for successful password reset
        if (urlParams.get('reset') === 'success') {
            showSuccess('Password reset successfully! You can now log in with your new password.');
        }

        // Forgot password flow
        function showForgotForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPanel').style.display = 'block';
            hideMessages();
        }

        function hideForgotForm() {
            document.getElementById('forgotPanel').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            hideMessages();
        }

        async function submitForgot() {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) {
                showError('Please enter your email address.');
                return;
            }
            const btn = document.getElementById('forgotBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';
            hideMessages();
            try {
                await fetch(`${apiClient.baseURL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                // Always show success regardless of whether email exists
                hideForgotForm();
                showSuccess('If that email is registered, a reset link is on its way. Check your inbox.');
            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send reset link';
            }
        }
    </script>
</body>

</html>
