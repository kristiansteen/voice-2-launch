<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - vimpl</title>
  <link rel="stylesheet" href="assets/css/fonts.css">
  <style>
    :root {
      --primary: #65c434;
      --primary-dark: #3d7a1f;
      --primary-light: #a3e085;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 440px;
      padding: 48px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-family: 'Birthstone', cursive;
      font-size: 48px;
      font-weight: 400;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    .logo p { color: #666; font-size: 14px; margin-top: 8px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--primary); }
    input::placeholder { color: #999; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 40px; }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 20px;
      padding: 4px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(101,196,52,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-message {
      background: #fee; border: 1px solid #fcc; color: #c33;
      padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none;
    }
    .success-message {
      background: #efe; border: 1px solid #cfc; color: #3c3;
      padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link { text-align: center; margin-top: 24px; font-size: 14px; color: #666; }
    .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }
    .hint { font-size: 12px; color: #999; margin-top: 6px; }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .container { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>vimpl</h1>
      <p>Choose a new password for your account.</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <div id="resetForm">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password">
          <button type="button" class="toggle-password" onclick="togglePw('newPassword', this)">👁️</button>
        </div>
        <p class="hint">Minimum 8 characters</p>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password">
          <button type="button" class="toggle-password" onclick="togglePw('confirmPassword', this)">👁️</button>
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="resetBtn" onclick="submitReset()">
        Set new password
      </button>
    </div>

    <div class="back-link">
      <a href="login.html">← Back to login</a>
    </div>
  </div>

  <script src="assets/js/api-client.js"></script>
  <script>
    const apiClient = new ApiClient();
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      showError('Invalid or missing reset token. Please request a new password reset link.');
      document.getElementById('resetForm').style.display = 'none';
    }

    async function submitReset() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      hideMessages();

      if (!newPassword || newPassword.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving...';

      try {
        const res = await fetch(`${apiClient.baseURL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Failed to reset password');

        document.getElementById('resetForm').style.display = 'none';
        showSuccess('Password reset successfully! Redirecting to login...');
        setTimeout(() => { window.location.href = 'login.html?reset=success'; }, 2000);
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Set new password';
      }
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = msg; el.style.display = 'block';
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMessage');
      el.textContent = msg; el.style.display = 'block';
    }
    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }
  </script>
  <script src="assets/js/cookie-banner.js" defer></script>
</body>
</html>
